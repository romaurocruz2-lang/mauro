<canvas id="grafico" style="max-width:400px;margin:20px auto;display:block;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
window.onload = async function () {

  try {
    const res = await fetch("/agendamentos");
    const dados = await res.json();

    if (!Array.isArray(dados)) {
      alert("Erro: dados inválidos do servidor");
      return;
    }

    const prof = {};

    dados.forEach(a => {
      if (a.profissional) {
        prof[a.profissional] = (prof[a.profissional] || 0) + 1;
      }
    });

    const ctx = document.getElementById("grafico");

    new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: Object.keys(prof),
        datasets: [{
          data: Object.values(prof),
          backgroundColor: [
            "#FF6384",
            "#36A2EB",
            "#FFCE56",
            "#4BC0C0",
            "#9966FF",
            "#FF9F40"
          ]
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: "bottom"
          }
        }
      }
    });

  } catch (error) {
    console.log(error);
    alert("Erro ao carregar dados do gráfico");
  }

};
</script>
