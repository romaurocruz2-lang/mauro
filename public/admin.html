<canvas id="grafico" style="max-width:400px;margin:20px auto;display:block;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  try {
    const res = await fetch("/agendamentos");
    const dados = await res.json();

    const prof = {};

    dados.forEach(a => {
      if (a.profissional) {
        prof[a.profissional] = (prof[a.profissional] || 0) + 1;
      }
    });

    const labels = Object.keys(prof);
    const values = Object.values(prof);

    // se não tiver dados, não quebra
    if (labels.length === 0) {
      document.getElementById("grafico").insertAdjacentHTML(
        "beforebegin",
        "<p>Nenhum agendamento ainda.</p>"
      );
      return;
    }

    new Chart(document.getElementById("grafico"), {
      type: "doughnut",
      data: {
        labels: labels,
        datasets: [{
          data: values,
          backgroundColor: [
            "#FF6384",
            "#36A2EB",
            "#FFCE56",
            "#4BC0C0",
            "#9966FF",
            "#FF9F40"
          ]
        }]
      },
      options: {
        animation: {
          duration: 1200
        },
        plugins: {
          legend: {
            position: "bottom"
          }
        }
      }
    });

  } catch (err) {
    console.log("Erro gráfico:", err);
    alert("Erro ao carregar gráfico");
  }

});
</script>
