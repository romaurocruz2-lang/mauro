<h1>Painel Admin</h1>

<p>Total: <span id="total">0</span></p>

<canvas id="grafico"></canvas>

<h3>Agendamentos</h3>
<div id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
async function carregar() {
  const res = await fetch("/agendamentos");
  const dados = await res.json();

  if (!Array.isArray(dados)) return;

  const prof = {};

  dados.forEach(a => {
    if (a.profissional) {
      prof[a.profissional] = (prof[a.profissional] || 0) + 1;
    }
  });

  document.getElementById("total").innerText = dados.length;

  new Chart(document.getElementById("grafico"), {
    type: "doughnut",
    data: {
      labels: Object.keys(prof),
      datasets: [{
        data: Object.values(prof),
        backgroundColor: ["#FF6384","#36A2EB","#FFCE56","#4BC0C0"]
      }]
    }
  });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  dados.forEach(a => {
    lista.innerHTML += `
      <p>
        <b>${a.nome}</b><br>
        ${a.profissional}<br>
        ${a.servico}<br>
        ${a.data} às ${a.horario}
      </p>
      <hr>
    `;
  });
}

carregar();
</script>
