<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="grafico" style="max-width:400px;margin:20px auto;display:block;"></canvas>

<script>
async function carregar() {
  const res = await fetch("/agendamentos");
  const dados = await res.json();

  const prof = {};

  dados.forEach(a => {
    prof[a.profissional] = (prof[a.profissional] || 0) + 1;
  });

  const ctx = document.getElementById("grafico");

  new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: Object.keys(prof),
      datasets: [{
        data: Object.values(prof),
        backgroundColor: [
          "#FF6384",
          "#36A2EB",
          "#FFCE56",
          "#4BC0C0",
          "#9966FF",
          "#FF9F40"
        ],
        hoverOffset: 15
      }]
    },
    options: {
      animation: {
        duration: 1500,   // animação suave
        easing: "easeOutBounce"
      },
      plugins: {
        legend: {
          position: "bottom"
        }
      }
    }
  });
}

carregar();
</script>
