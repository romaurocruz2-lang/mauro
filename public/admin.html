<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
async function carregar() {
  const res = await fetch("/agendamentos");
  const dados = await res.json();

  if (!Array.isArray(dados)) return;

  const prof = {};

  dados.forEach(a => {
    if (a.profissional) {
      prof[a.profissional] = (prof[a.profissional] || 0) + 1;
    }
  });

  document.getElementById("total").innerText = dados.length;

  new Chart(document.getElementById("grafico"), {
    type: "doughnut",
    data: {
      labels: Object.keys(prof),
      datasets: [{
        data: Object.values(prof),
        backgroundColor: ["#FF6384","#36A2EB","#FFCE56","#4BC0C0"]
      }]
    }
  });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  dados.forEach(a => {
    lista.innerHTML += `<p>${a.nome} - ${a.profissional} - ${a.data}</p>`;
  });
}

carregar();
</script>
