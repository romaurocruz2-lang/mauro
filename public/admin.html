<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>
</head>

<body style="font-family: Arial; background:#f4f4f4; padding:20px;">

  <h1>Painel Admin</h1>

  <p>Total de agendamentos: <span id="total">0</span></p>

  <hr>

  <h3>Lista de Agendamentos</h3>

  <div id="lista"></div>

  <script>
    async function carregar() {
      try {
        const res = await fetch("/agendamentos");
        const dados = await res.json();

        // total
        document.getElementById("total").innerText = dados.length;

        // lista
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (dados.length === 0) {
          lista.innerHTML = "<p>Nenhum agendamento ainda.</p>";
          return;
        }

        dados.forEach(a => {
          lista.innerHTML += `
            <div style="background:#fff;padding:10px;margin:10px 0;border-radius:8px;">
              <b>Nome:</b> ${a.nome || "—"} <br>
              <b>Profissional:</b> ${a.profissional || "—"} <br>
              <b>Serviço:</b> ${a.servico || "—"} <br>
              <b>Data:</b> ${a.data || "—"} <br>
              <b>Hora:</b> ${a.hora || "—"}
            </div>
          `;
        });

      } catch (err) {
        document.getElementById("lista").innerHTML =
          "<p style='color:red;'>Erro ao carregar dados</p>";
      }
    }

    carregar();
  </script>

</body>
</html>
