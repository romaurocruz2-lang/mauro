<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento de Serviço</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: Arial, sans-serif;
    }
    .container {
      max-width: 600px;
      margin-top: 50px;
      padding: 30px;
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
    }
    .form-control {
      margin-bottom: 15px;
    }
    .btn-primary {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Agende Seu Serviço</h2>
    <form id="agendarForm">
      <div class="mb-3">
        <label for="nome" class="form-label">Nome</label>
        <input type="text" id="nome" class="form-control" placeholder="Seu nome" required>
      </div>
      <div class="mb-3">
        <label for="whatsapp" class="form-label">WhatsApp</label>
        <input type="text" id="whatsapp" class="form-control" placeholder="Seu WhatsApp" required>
      </div>
      <div class="mb-3">
        <label for="servico" class="form-label">Serviço</label>
        <select id="servico" class="form-control" required>
          <option value="">Selecione o serviço</option>
          <option value="Corte Feminino">Corte Feminino</option>
          <option value="Escova">Escova</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="data" class="form-label">Data</label>
        <input type="date" id="data" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="hora" class="form-label">Hora</label>
        <select id="hora" class="form-control" required>
          <option value="">Selecione o horário</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Agendar</button>
    </form>
  </div>

  <script>
    document.getElementById("data").addEventListener("change", function() {
      const dataEscolhida = this.value;
      const horaSelect = document.getElementById("hora");
      horaSelect.innerHTML = `<option value="">Carregando...</option>`;

      fetch(`/horarios-disponiveis?data=${dataEscolhida}`)
        .then(response => response.json())
        .then(horarios => {
          horaSelect.innerHTML = `<option value="">Selecione o horário</option>`;
          horarios.forEach(hora => {
            const option = document.createElement("option");
            option.value = hora;
            option.innerText = hora;
            horaSelect.appendChild(option);
          });
        });
    });

    document.getElementById("agendarForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const nome = document.getElementById("nome").value;
      const whatsapp = document.getElementById("whatsapp").value;
      const servico = document.getElementById("servico").value;
      const data = document.getElementById("data").value;
      const hora = document.getElementById("hora").value;

      if (nome && whatsapp && servico && data && hora) {
        fetch("/agendar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ nome, whatsapp, servico, data, hora })
        })
        .then(response => response.json())
        .then(data => {
          if (data.ok) {
            alert("Agendamento realizado com sucesso!");
          } else {
            alert("Erro ao realizar o agendamento.");
          }
        });
      }
    });
  </script>
</body>
</html>
