<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login do Sistema</title>
</head>

<body style="font-family: Arial; text-align:center; background:#f4f4f4; padding:50px;">

  <h1>Login do Sistema</h1>

  <p>Entre com seu acesso</p>

  <br>

  <input id="user" placeholder="Usuário" style="padding:10px;width:200px;"><br><br>

  <input id="pass" type="password" placeholder="Senha" style="padding:10px;width:200px;"><br><br>

  <button onclick="login()" style="
    padding:10px 20px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
  ">
    Entrar
  </button>

  <p id="msg" style="color:red;"></p>

  <script>
    async function login() {
      const user = document.getElementById("user").value;
      const pass = document.getElementById("pass").value;

      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user, pass })
      });

      const data = await res.json();

      if (data.ok) {
        window.location.href = "/admin.html";
      } else {
        document.getElementById("msg").innerText = "Usuário ou senha incorretos";
      }
    }
  </script>

</body>
</html>
